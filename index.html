<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- A-Frame + AR.js -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<!-- MQTT -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
}

.panel {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(255,255,255,0.9);
  padding: 10px;
  border-radius: 10px;
  z-index: 2;
}

.panel div {
  margin: 5px 0;
}

button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  background: #007bff;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- CONTROL PANEL -->
<div class="panel">
  <div>💡 Bulb <button onclick="toggle('bulb')"><span id="bulbStatus">OFF</span></button></div>
  <div>🌀 Fan <button onclick="toggle('fan')"><span id="fanStatus">OFF</span></button></div>
  <div>❄️ AC <button onclick="toggle('ac')"><span id="acStatus">OFF</span></button></div>
  <div>🧊 Fridge <button onclick="toggle('fridge')"><span id="fridgeStatus">OFF</span></button></div>
</div>

<!-- FIXED CAMERA + AR SETTINGS -->
<a-scene 
  embedded 
  arjs="sourceType: webcam; debugUIEnabled: false;"
  vr-mode-ui="enabled: false">

  <!-- BULB -->
  <a-marker type="pattern" url="patterns/pattern-BULB_marker.patt">
    <a-entity id="bulb"
      gltf-model="lightBulb.glb"
      scale="1 1 1"
      position="0 0.5 0"
      rotation="-90 0 0">
    </a-entity>
  </a-marker>

  <!-- FAN -->
  <a-marker type="pattern" url="patterns/pattern-FAN_marker.patt">
    <a-entity id="fan"
      gltf-model="FanPrefab.glb"
      scale="1 1 1"
      position="0 0.5 0"
      rotation="-90 0 0">
    </a-entity>
  </a-marker>

  <!-- AC -->
  <a-marker type="pattern" url="patterns/pattern-AC_marker.patt">
    <a-entity id="ac"
      gltf-model="Outdoor_AC_Unit.glb"
      scale="1 1 1"
      position="0 0.5 0"
      rotation="-90 0 0">
    </a-entity>
  </a-marker>

  <!-- FRIDGE -->
  <a-marker type="pattern" url="patterns/pattern-REFRIGERATOR_marker.patt">
    <a-entity id="fridge"
      gltf-model="Refrigerator.glb"
      scale="1 1 1"
      position="0 0.5 0"
      rotation="-90 0 0">
    </a-entity>
  </a-marker>

  <!-- CAMERA -->
  <a-entity camera look-controls="enabled: false"></a-entity>

</a-scene>

<script>
// MQTT
const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

client.on('connect', () => {
  console.log("MQTT Connected");
});

// STATES
let state = {
  bulb: false,
  fan: false,
  ac: false,
  fridge: false
};

function toggle(device){
  let model = document.getElementById(device);
  let status = document.getElementById(device + "Status");

  state[device] = !state[device];

  // Show/hide model
  model.setAttribute("visible", state[device]);

  // Update button text
  status.innerText = state[device] ? "ON" : "OFF";

  // MQTT publish
  client.publish(`home/${device}/control`, state[device] ? "ON" : "OFF");

  // FAN animation
  if(device === "fan"){
    if(state.fan){
      model.setAttribute("animation",
        "property: rotation; to: 0 360 0; loop: true; dur: 1000");
    } else {
      model.removeAttribute("animation");
    }
  }

  // BULB glow
  if(device === "bulb"){
    model.setAttribute("material",
      state.bulb ? "emissive: yellow; emissiveIntensity:1"
                 : "emissive: black; emissiveIntensity:0");
  }
}
</script>

</body>
</html>
